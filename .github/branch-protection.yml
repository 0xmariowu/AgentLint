repository: 0xmariowu/AgentLint
branch: main
required_status_checks:
  strict: true
  # Names match the actual check-runs CI emits on `push: main` events.
  # Removed two contexts that never appear on tag SHAs (so release.yml's
  # P0-2-tag gate could never satisfy them):
  #   - `check-test-pairing` — produced by .github/workflows/test-required.yml
  #     which only runs on pull_request events.
  #   - `CodeQL` — duplicates `analyze`. The CodeQL workflow's only job is
  #     `analyze`, so the actual check-run name on every commit is
  #     `analyze`. Listing both made one of them perpetually missing.
  # Live remote protection should be re-applied via
  # `bash scripts/setup-branch-protection.sh --apply` after this lands so
  # the same drift doesn't reappear.
  contexts:
    - test (ubuntu-latest, 20)
    - test (ubuntu-latest, 22)
    - test (macos-latest, 20)
    - test (macos-latest, 22)
    - test (windows-latest, 20)
    - test (windows-latest, 22)
    - npm-e2e (ubuntu-latest)
    - npm-e2e (macos-latest)
    - npm-e2e (windows-latest)
    - lint
    - analyze
    - Semgrep
    - scan
