repository: 0xmariowu/AgentLint
branch: main
required_status_checks:
  strict: true
  # Names match the actual check-runs CI emits on `push: main` events.
  #
  # 2026-04-26 (v1.1.13 reverts F003 from v1.1.12): `CodeQL` and
  # `check-test-pairing` are NOT in this list. Reason — both are
  # unsatisfiable on tag SHAs and on `push:main` SHAs, even with
  # parent-SHA fallback:
  #   - `CodeQL` is the WORKFLOW name; the only job in that workflow
  #     is `analyze`. GitHub's check-runs API returns job names, so
  #     the actual check-run on every commit is `analyze`, not
  #     `CodeQL`. Listing both made `CodeQL` perpetually missing.
  #   - `check-test-pairing` is from `test-required.yml` which runs
  #     only on `pull_request` events. Squash-merge to main produces
  #     a new commit that has the merge metadata but never re-runs
  #     PR-only workflows. So this check-run does not exist on the
  #     main-branch SHA OR on the parent SHA (the squash-merge target).
  #     Parent-SHA fallback (PR #213) covers squash-merges that don't
  #     fire `push:main` events; it does NOT make PR-only check-runs
  #     retroactively appear on main commits.
  # v1.1.12 attempted to add both with the parent-fallback as the
  # rationale; the v1.1.12 release.yml run timed out at attempt 20/20
  # with `Still missing: CodeQL check-test-pairing` — confirming the
  # mistake. The correct posture is to keep these out of the YAML
  # (and accept that live main protection has drift, OR remove them
  # from live separately as an admin operation).
  # Live remote protection drift is acknowledged when running
  # `bash scripts/setup-branch-protection.sh --verify` — that drift
  # is intentional given the contexts above are all the release-side
  # gate can satisfy.
  contexts:
    - test (ubuntu-latest, 20)
    - test (ubuntu-latest, 22)
    - test (macos-latest, 20)
    - test (macos-latest, 22)
    - test (windows-latest, 20)
    - test (windows-latest, 22)
    - npm-e2e (ubuntu-latest)
    - npm-e2e (macos-latest)
    - npm-e2e (windows-latest)
    - lint
    - analyze
    - Semgrep
    - scan
