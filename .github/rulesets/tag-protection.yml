# Tag protection ruleset for AgentLint (P0-2-tag, 2026-04-26; refined 2026-04-26).
#
# Goal: prevent any actor (including non-admin maintainers and forked-fork
# release attempts) from pushing or rewriting arbitrary semver release
# tags that bypass main's required CI gates. The release.yml workflow
# ALSO enforces `git merge-base --is-ancestor` + a Checks API gate; this
# ruleset is the branch-protection-style outer gate.
#
# Why the include pattern is `v*.*.*` (three segments):
# - Immutable release tags (v1.1.9, v1.1.10, v2.0.0, ...) MUST be locked
#   against rewrite or deletion. Three-segment glob captures them.
# - Moving major-version tags (v1, v2) are intentionally NOT covered —
#   release.yml force-pushes the moving v1 to track the latest patch on
#   each release. Bringing them under non_fast_forward would block the
#   release flow, and any bypass actor we'd add (Integration / RepositoryRole)
#   has its own auth surface to defend.
# - Two-segment tags (v1.1) are ambiguous; no current pipeline writes
#   them. If we adopt them, extend the include list explicitly rather
#   than loosen the glob.
#
# bypass_actors deliberately empty: nothing should be force-pushing
# semver-shaped tags. If an emergency requires it, the repo admin can
# edit this ruleset directly via the GitHub UI for the duration.
#
# Earlier drafts had bypass entries with `actor_type: User` (not a valid
# rulesets actor_type) and `actor_type: RepositoryRole / actor_id: 71`
# (71 is not a built-in role ID); GitHub's API rejected both with
# "Invalid bypass actor" 422. Removing them is correct now that the
# include pattern excludes the moving major-version tags that would
# otherwise need bypass.
#
# Apply via: bash scripts/setup-tag-protection.sh --apply
# Verify via: bash scripts/setup-tag-protection.sh --verify
#
# References:
#   - https://docs.github.com/en/rest/repos/rules
#   - https://docs.github.com/en/repositories/configuring-branches-and-merges-in-your-repository/managing-rulesets
name: tag-protection-v
target: tag
enforcement: active
conditions:
  ref_name:
    include:
      - refs/tags/v*.*.*
    exclude: []
rules:
  # Block force-push / rewrite of an existing semver tag.
  - type: non_fast_forward
  # Block deletion of semver tags via push.
  - type: deletion
bypass_actors: []
