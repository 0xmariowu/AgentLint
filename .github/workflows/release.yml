name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Least-privilege default for any future job added to this workflow.
# Release job below elevates to contents: write for creating the GitHub Release.
permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Check if release already exists
        id: check
        run: |
          if gh release view "${{ github.ref_name }}" &>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Validate tag matches source version
        if: steps.check.outputs.exists == 'false'
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          if [ -f .claude-plugin/plugin.json ]; then
            PLUGIN_VERSION=$(python3 -c "import json; print(json.load(open('.claude-plugin/plugin.json'))['version'])")
            if [ "$VERSION" != "$PLUGIN_VERSION" ]; then
              echo "::error::Tag v$VERSION does not match plugin.json version $PLUGIN_VERSION"
              echo "::error::Run: scripts/bump-version.sh $VERSION"
              exit 1
            fi
          fi

      - name: Validate content sync
        if: steps.check.outputs.exists == 'false'
        run: |
          ACTUAL_CHECKS=$(python3 -c "import json; print(len(json.load(open('standards/weights.json'))['check_weights']))")
          META_CHECKS=$(python3 -c "import json; print(json.load(open('release-metadata.json'))['check_count'])")

          if [ "$ACTUAL_CHECKS" != "$META_CHECKS" ]; then
            echo "::error::release-metadata.json check_count ($META_CHECKS) != actual ($ACTUAL_CHECKS)"
            echo "::error::Run: scripts/bump-version.sh"
            exit 1
          fi

          if ! grep -q "checks-${ACTUAL_CHECKS}-" README.md; then
            echo "::error::README.md badge does not contain checks-${ACTUAL_CHECKS}"
            echo "::error::Run: scripts/bump-version.sh"
            exit 1
          fi

          echo "Validated: check_count=$ACTUAL_CHECKS (metadata + README in sync)"

      - name: Extract changelog for this version
        if: steps.check.outputs.exists == 'false'
        id: changelog
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          SAFE_TAG="${TAG//./\\.}"
          NOTES=""
          if [ -f CHANGELOG.md ]; then
            NOTES=$(awk "/^## v${SAFE_TAG}([[:space:]]|$)/{found=1; next} /^## v[0-9]/{if(found) exit} found" CHANGELOG.md | awk 'NF{p=1} p')
          fi
          if [ -n "$NOTES" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "$NOTES" > /tmp/release-notes.md
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          if [ "${{ steps.changelog.outputs.found }}" == "true" ]; then
            gh release create "$TAG" --title "AgentLint ${VERSION}" --notes-file /tmp/release-notes.md
          else
            gh release create "$TAG" --title "AgentLint ${VERSION}" --generate-notes
          fi

      - name: Publish to npm
        if: steps.check.outputs.exists == 'false'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          cd npm
          node -e "
            const pkg = require('./package.json');
            pkg.version = '$VERSION';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > .npmrc
          npm publish --access public
          rm -f .npmrc
          echo "Published @0xmariowu/agent-lint@${VERSION} to npm"

      - name: Sync to website repo (agent-lint-simple-green)
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          METADATA=$(cat release-metadata.json | jq -c .)

          if [ -n "$GH_TOKEN" ]; then
            gh workflow run sync-release.yml \
              --repo 0xmariowu/agent-lint-simple-green \
              -f version="$VERSION" \
              -f metadata="$METADATA" \
              || echo "::warning::Website sync failed (check CROSS_REPO_TOKEN)"
          else
            echo "::warning::Skipping website sync (CROSS_REPO_TOKEN not configured)"
          fi

      - name: Summary
        if: steps.check.outputs.exists == 'false'
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          {
            echo "## Released ${VERSION}"
            echo "- GitHub Release: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${TAG}"
            echo "- npm: [@0xmariowu/agent-lint@${VERSION}](https://www.npmjs.com/package/@0xmariowu/agent-lint)"
          } >> "$GITHUB_STEP_SUMMARY"
