name: Commit Message PII Scan

on:
  pull_request:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Scan PR commit messages for PII
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # Placeholder patterns that are intentional in docs (mirrors .husky/pre-commit).
          PLACEHOLDER='/Users/xxx|/home/xxx|/home/testuser|/Users/yourusername|/Users/example|/home/runner'
          # File patterns that legitimately carry '.local' (config filenames, not hostnames).
          LOCAL_ALLOW='CLAUDE\.local\.md|\.env\.local|\.ship-boundary-deny\.local|CLAUDE\.LOCAL\.md'

          MSGS=$(git log --no-merges --format='%H%n%B%n---SEP---' "${BASE_SHA}..${HEAD_SHA}")

          BAD=$(echo "$MSGS" \
            | grep -nE '/Users/[a-zA-Z0-9_]+/|/home/[a-z][a-z0-9_-]+/|[a-zA-Z0-9][a-zA-Z0-9-]*\.ts\.net|[a-zA-Z][a-zA-Z0-9-]*\.local\b' \
            | grep -vE "$PLACEHOLDER" \
            | grep -vE "$LOCAL_ALLOW" \
            || true)

          if [ -n "$BAD" ]; then
            echo "::error::PII in commit message(s):"
            echo "$BAD"
            echo ""
            echo "Rewrite the offending commit(s) with 'git rebase -i' and force-push."
            echo "Allowed placeholders: /Users/xxx, /home/testuser, etc. — match .husky/pre-commit."
            exit 1
          fi

          echo "No personal paths or machine hostnames in commit messages."
