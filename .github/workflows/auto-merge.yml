name: Auto merge

on:
  pull_request:
    types: [opened, reopened, ready_for_review]

jobs:
  enable:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      # enablePullRequestAutoMerge (the GraphQL mutation `gh pr merge --auto`
      # calls) needs contents:write to write the resulting merge commit —
      # pull-requests:write alone fails with "Resource not accessible by
      # integration." Verified empirically across three sibling repos where
      # only the contents:write repo (lazie) could enable auto-merge.
      contents: write
      pull-requests: write
    steps:
      - run: gh pr merge --auto --squash --repo "${{ github.repository }}" "${{ github.event.pull_request.number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
